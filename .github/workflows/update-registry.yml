name: Update Submission Registry

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

jobs:
  update-registry:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Checks out base branch at GITHUB_SHA (includes the merge commit)

      - name: Update registry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/update_registry.py

      - name: Commit registry update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games/*/SUBMISSIONS.md
          git diff --cached --quiet && echo "No changes to commit." || \
            git commit -m "registry: add submission from PR #${{ github.event.pull_request.number }}" && \
            git push
